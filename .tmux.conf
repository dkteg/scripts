# ============================================
# Tmux Configuration File
# ============================================

# ----------------
# General Settings
# ----------------

# Set prefix to Ctrl-a (instead of default Ctrl-b)
# Uncomment if you prefer Ctrl-a
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Set default terminal mode to 256 color mode
set -g default-terminal "screen-256color"

# Increase scrollback buffer size
set -g history-limit 10000

# Start window numbering at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ----------------
# Pane Splitting
# ----------------

# Split panes using | and - (more intuitive)
bind - split-window -v -c "#{pane_current_path}"

# Unbind default split keys (optional)
unbind '"'

# ----------------
# Pane Navigation
# ----------------

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ----------------
# Pane Resizing
# ----------------

# Resize panes using Prefix + Shift + arrow keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----------------
# Window Management
# ----------------

# Create new window with current path
bind c new-window -c "#{pane_current_path}"

# Switch windows using Shift-arrow (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# ----------------
# Copy Mode (Vi-style)
# ----------------

# Use vi mode for copy mode
setw -g mode-keys vi

# Vi-style copy/paste
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# ----------------
# Appearance
# ----------------

# Status bar styling
set -g status-style bg=black,fg=white
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
set -g status-right "#[fg=cyan]%d %b %R"
set -g status-interval 60

# Pane border styling
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour51

# ----------------
# Miscellaneous
# ----------------

# Reload config file with Prefix + r
bind r source-file ~/.tmux.conf

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# Reduce escape time (useful for Vim)
set -sg escape-time 0

# Toggle synchronized input with Prefix + Ctrl-s
bind C-s setw synchronize-panes \; display-message "Toggled synchronized panes"
